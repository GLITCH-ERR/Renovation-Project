<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Submit Renovation Request</title>
        <style>
            body {
                font-family: sans-serif;
                margin: 0;
                padding: 40px 20px;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                background: #f9f9f9;
            }
            .form-container {
                margin: 40px 20px;
            }
            footer {
                margin-top: auto;
                padding: 16px 32px;
                border-top: 1px solid #ccc;
                width: 100%;
            }
            h1 {
                font-size: 1.5rem;
                margin-bottom: 24px;
            }
            label {
                font-size: 0.85rem;
                font-weight: 600;
                display: block;
                margin-bottom: 4px;
                margin-top: 16px;
            }
            input, select, textarea {
                width: 100%;
                padding: 10px;
                font-size: 0.9rem;
                border: 1px solid #ccc;
                border-radius: 4px;
                font-family: sans-serif;
            }
            textarea {
                resize: vertical;
            }
            button[type="submit"] {
                margin-top: 24px;
                padding: 12px 32px;
                font-size: 0.9rem;
                font-weight: 600;
                cursor: pointer;
                background: #1a1a1a;
                color: #fff;
                border: none;
                border-radius: 4px;
            }
            #status {
                margin-top: 16px;
                font-weight: 600;
                font-size: 0.85rem;
            }
        </style>
    </head>

    <body>
        <div class="form-container">
        <h1>Submit Renovation Request</h1>

        <form id="requestForm">
            <label>Project Title</label>
            <input type="text" id="title" required>

            <label>Zip Code</label>
            <input type="text" id="zip" pattern="[0-9]{5}" required>

            <label>Email Address</label>
            <input type="email" id="email" required>

            <label>Category</label>
            <select id="category" required>
                <option value="">Select a category</option>
                <option value="drywall">Drywall</option>
                <option value="painting">Painting</option>
                <option value="flooring">Flooring</option>
                <option value="roofing">Roofing</option>
                <option value="kitchen">Kitchen</option>
            </select>

            <label>Upload Pictures (Optional - Max 2)</label>
            <input type="file" id="images" accept="image/*" multiple>

            <label>Project Description</label>
            <textarea id="description" rows="4" required></textarea>

            <button type="submit">Submit Request</button>
        </form>

        <div id="status"></div>
        </div>
       
       
        <footer>
			<small>Ace Contract CS324</small>
		</footer>

        <script type="module" src="app.js"></script>
    </body>
</html>
